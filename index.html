<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TREE知识星图 - 清单视图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh; color: #e0e0e0;
        }
        .container { display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 300px; background: rgba(26,26,46,0.95);
            border-right: 1px solid rgba(155,142,196,0.3);
            padding: 20px; overflow-y: auto; flex-shrink: 0;
        }
        .sidebar h2 { font-size: 16px; color: #9b8ec4; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .sidebar h2 span { font-size: 20px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
        .tab {
            flex: 1; padding: 8px 4px; border: 1px solid rgba(155,142,196,0.3);
            background: rgba(26,26,46,0.6); color: #888; border-radius: 6px;
            cursor: pointer; text-align: center; font-size: 12px; font-weight: 500;
            transition: all 0.2s;
        }
        .tab:hover { background: rgba(155,142,196,0.15); color: #ccc; }
        .tab.active { background: rgba(155,142,196,0.25); color: #fff; border-color: #9b8ec4; }
        
        /* Domain cards in sidebar */
        .domain-card {
            padding: 12px; margin-bottom: 8px; border-radius: 8px;
            border: 1px solid rgba(155,142,196,0.15); cursor: pointer;
            transition: all 0.2s; background: rgba(26,26,46,0.6);
        }
        .domain-card:hover { background: rgba(155,142,196,0.12); border-color: rgba(155,142,196,0.3); transform: translateY(-1px); }
        .domain-card.active { background: rgba(155,142,196,0.18); border-color: rgba(155,142,196,0.5); }
        .domain-card .domain-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .domain-card .domain-icon { font-size: 20px; }
        .domain-card .domain-name { font-size: 14px; font-weight: 600; }
        .domain-card .domain-count { font-size: 11px; color: #888; margin-left: auto; }
        .domain-card .progress-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
        .domain-card .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
        .domain-card .progress-text { font-size: 10px; color: #666; margin-top: 4px; display: flex; justify-content: space-between; }
        
        /* Stats row */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
        .stat-card {
            background: rgba(26,26,46,0.8); border: 1px solid rgba(155,142,196,0.15);
            border-radius: 8px; padding: 10px; text-align: center;
        }
        .stat-card .stat-num { font-size: 22px; font-weight: 700; }
        .stat-card .stat-label { font-size: 10px; color: #888; margin-top: 2px; }
        
        /* Main content */
        .main {
            flex: 1; padding: 24px; overflow-y: auto;
        }
        .main-header { margin-bottom: 24px; }
        .main-header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .main-header .subtitle { font-size: 13px; color: #888; }
        
        /* Search */
        .search-box {
            width: 100%; max-width: 400px; padding: 10px 16px;
            background: rgba(26,26,46,0.8); border: 1px solid rgba(155,142,196,0.3);
            border-radius: 8px; color: #e0e0e0; font-size: 14px; margin-bottom: 20px;
            outline: none; transition: border-color 0.2s;
        }
        .search-box:focus { border-color: #9b8ec4; }
        .search-box::placeholder { color: #555; }
        
        /* Node groups */
        .node-group { margin-bottom: 24px; }
        .group-header {
            font-size: 13px; font-weight: 600; color: #9b8ec4;
            margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
            padding-bottom: 6px; border-bottom: 1px solid rgba(155,142,196,0.15);
        }
        .group-header .badge {
            font-size: 10px; padding: 2px 8px; border-radius: 10px;
            font-weight: 500;
        }
        
        /* Node items */
        .node-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; margin-bottom: 4px; border-radius: 8px;
            cursor: pointer; transition: all 0.15s;
            border: 1px solid transparent;
        }
        .node-item:hover { background: rgba(155,142,196,0.1); border-color: rgba(155,142,196,0.2); }
        .node-item.selected { background: rgba(155,142,196,0.18); border-color: rgba(155,142,196,0.4); }
        
        .node-status {
            width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
        }
        .status-completed { background: #4caf50; box-shadow: 0 0 6px rgba(76,175,80,0.5); }
        .status-current { background: #ff9800; box-shadow: 0 0 6px rgba(255,152,0,0.5); }
        .status-pending { background: #555; border: 1px solid #666; }
        
        .node-info { flex: 1; min-width: 0; }
        .node-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .node-meta { font-size: 11px; color: #666; margin-top: 2px; }
        .node-difficulty {
            font-size: 10px; padding: 2px 8px; border-radius: 10px;
            background: rgba(255,255,255,0.06); color: #888;
        }
        
        /* Detail panel */
        .detail-panel {
            position: fixed; top: 0; right: -400px; width: 380px; height: 100vh;
            background: rgba(26,26,46,0.98); border-left: 1px solid rgba(155,142,196,0.3);
            padding: 24px; transition: right 0.3s; z-index: 100; overflow-y: auto;
        }
        .detail-panel.open { right: 0; }
        .detail-close {
            position: absolute; top: 16px; right: 16px; width: 28px; height: 28px;
            border: none; background: rgba(255,255,255,0.08); border-radius: 50%;
            color: #888; cursor: pointer; font-size: 14px; display: flex;
            align-items: center; justify-content: center; transition: all 0.2s;
        }
        .detail-close:hover { background: rgba(255,255,255,0.15); color: #fff; }
        .detail-domain-tag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 12px; border-radius: 12px; font-size: 12px;
            margin-bottom: 12px;
        }
        .detail-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
        .detail-status { font-size: 12px; margin-bottom: 16px; }
        .detail-section { margin-bottom: 16px; }
        .detail-section h3 { font-size: 12px; color: #9b8ec4; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .detail-section p { font-size: 13px; color: #aaa; line-height: 1.6; }
        .detail-prereqs { list-style: none; padding: 0; }
        .detail-prereqs li {
            padding: 6px 12px; margin-bottom: 4px; border-radius: 6px;
            font-size: 12px; cursor: pointer; transition: all 0.15s;
            border: 1px solid rgba(155,142,196,0.1);
        }
        .detail-prereqs li:hover { background: rgba(155,142,196,0.12); }
        
        /* L1 overview */
        .l1-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .l1-domain-card {
            padding: 20px; border-radius: 12px;
            border: 1px solid rgba(155,142,196,0.2); cursor: pointer;
            transition: all 0.2s; background: rgba(26,26,46,0.8);
        }
        .l1-domain-card:hover { transform: translateY(-2px); border-color: rgba(155,142,196,0.4); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .l1-domain-card .l1-icon { font-size: 32px; margin-bottom: 8px; }
        .l1-domain-card .l1-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .l1-domain-card .l1-progress { font-size: 12px; color: #888; margin-bottom: 12px; }
        .l1-domain-card .l1-bar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
        .l1-domain-card .l1-bar-fill { height: 100%; border-radius: 3px; }
        .l1-domain-card .l1-nodes-preview { font-size: 11px; color: #666; }
        
        /* L3 all view */
        .l3-domain-section { margin-bottom: 32px; }
        .l3-domain-header {
            font-size: 16px; font-weight: 600; margin-bottom: 12px;
            padding-bottom: 8px; border-bottom: 2px solid;
            display: flex; align-items: center; gap: 8px;
        }
        
        /* Toast */
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(155,142,196,0.9); color: #fff; padding: 10px 20px;
            border-radius: 8px; font-size: 13px; z-index: 200;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
        
        /* Empty state */
        .empty-state { text-align: center; padding: 60px 20px; color: #555; }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; }
        
        /* Back button */
        .back-btn {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 6px 12px; border: 1px solid rgba(155,142,196,0.3);
            background: transparent; color: #9b8ec4; border-radius: 6px;
            cursor: pointer; font-size: 12px; transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(155,142,196,0.12); }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 240px; padding: 12px; }
            .l1-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

// ===== State =====
let currentLayer = 'L1';
let currentDomain = null;
let selectedNodeId = null;
let searchQuery = '';

// ===== Utility =====
function getDomainColor(d) { return domainColors[d] || '#8b7cb6'; }
function getDomainIcon(d) { return domainIcons[d] || '📚'; }
function getDomainName(d) { return domainNamesCN[d] || d; }
function getStatusText(s) {
    return s === 'completed' ? '✅ 已完成' : s === 'current' ? '▶ 学习中' : '⏳ 待学习';
}
function getStatusClass(s) {
    return s === 'completed' ? 'status-completed' : s === 'current' ? 'status-current' : 'status-pending';
}

// ===== Render Stats =====
function renderStats() {
    const totalNodes = allNodes.length;
    const completed = allNodes.filter(n => n.status === 'completed').length;
    const current = allNodes.filter(n => n.status === 'current').length;
    const domainCount = Object.keys(domainStats).length;
    
    document.getElementById('stats-area').innerHTML = `
        <div class="stat-card"><div class="stat-num" style="color:#9b8ec4">${domainCount}</div><div class="stat-label">知识领域</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#5470c6">${totalNodes}</div><div class="stat-label">知识节点</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#4caf50">${completed}</div><div class="stat-label">已完成</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#ff9800">${current}</div><div class="stat-label">学习中</div></div>
    `;
}

// ===== Render Sidebar Domains =====
function renderSidebarDomains() {
    const container = document.getElementById('sidebar-domains');
    let html = '';
    for (const [domain, stats] of Object.entries(domainStats)) {
        const color = getDomainColor(domain);
        const icon = getDomainIcon(domain);
        const name = getDomainName(domain);
        const completed = allNodes.filter(n => n.domain === domain && n.status === 'completed').length;
        const current = allNodes.filter(n => n.domain === domain && n.status === 'current').length;
        const total = stats.total;
        const pct = total > 0 ? Math.round((completed + current * 0.5) / total * 100) : 0;
        const isActive = currentDomain === domain;
        
        html += `<div class="domain-card ${isActive ? 'active' : ''}" onclick="selectDomain('${domain}')" style="border-left: 3px solid ${color}">
            <div class="domain-header">
                <span class="domain-icon">${icon}</span>
                <span class="domain-name" style="color:${color}">${name}</span>
                <span class="domain-count">${total}节点</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" style="width:${pct}%;background:${color}"></div>
            </div>
            <div class="progress-text">
                <span>完成${completed} · 进行${current}</span>
                <span>${pct}%</span>
            </div>
        </div>`;
    }
    container.innerHTML = html;
}

    </div>

    for (const [domain, stats] of Object.entries(domainStats)) {
        const color = getDomainColor(domain);
        const icon = getDomainIcon(domain);
        const name = getDomainName(domain);
        const completed = allNodes.filter(n => n.domain === domain && n.status === 'completed').length;
        const current = allNodes.filter(n => n.domain === domain && n.status === 'current').length;
        const total = stats.total;
        const pct = total > 0 ? Math.round((completed + current * 0.5) / total * 100) : 0;
        
        // Preview nodes
        const domainNodes = allNodes.filter(n => n.domain === domain);
        const activeNodes = domainNodes.filter(n => n.status !== 'pending').slice(0, 3);
        let previewText = activeNodes.map(n => n.name).join(' · ');
        if (!previewText) previewText = '尚未开始学习';
        
        html += `<div class="l1-domain-card" onclick="selectDomain('${domain}')" style="border-top: 3px solid ${color}">
            <div class="l1-icon">${icon}</div>
            <div class="l1-name" style="color:${color}">${name}</div>
            <div class="l1-progress">完成 ${completed}/${total} · 学习中 ${current}</div>
            <div class="l1-bar"><div class="l1-bar-fill" style="width:${pct}%;background:${color}"></div></div>
            <div class="l1-nodes-preview">${previewText}</div>
        </div>`;
    }
    
    html += '</div>';
    main.innerHTML = html;
}

// ===== L2 View =====
function renderL2(domainId) {
    if (!domainId) return;
    const domain = domainId;
    const color = getDomainColor(domain);
    const icon = getDomainIcon(domain);
    const name = getDomainName(domain);
    const domainNodes = allNodes.filter(n => n.domain === domain);
    
    // Group by status
    const completed = domainNodes.filter(n => n.status === 'completed');
    const current = domainNodes.filter(n => n.status === 'current');
    const pending = domainNodes.filter(n => n.status === 'pending');
    
    // Group pending by difficulty
    const pendingByDiff = {};
    pending.forEach(n => {
        const diff = n.difficulty || '未分类';
        if (!pendingByDiff[diff]) pendingByDiff[diff] = [];
        pendingByDiff[diff].push(n);
    });
    
    // Get prerequisites for each node
    function getPrereqs(nodeId) {
        return allEdges.filter(e => e.target === nodeId && e.type === 'prerequisite')
                       .map(e => allNodes.find(n => n.id === e.source))
                       .filter(Boolean);
    }
    function getNextNodes(nodeId) {
        return allEdges.filter(e => e.source === nodeId)
                       .map(e => allNodes.find(n => n.id === e.target))
                       .filter(Boolean);
    }
    
    const main = document.getElementById('main-content');
    let html = `<div class="main-header">
        <button class="back-btn" onclick="switchLayer('L1')">← 返回总览</button>
        <h1 style="margin-top:8px">${icon} ${name}</h1>
        <div class="subtitle">${domainNodes.length} 个知识节点 · 完成 ${completed.length} · 学习中 ${current.length}</div>
    </div>
    <input class="search-box" placeholder="搜索节点..." oninput="onSearch(this.value)" />`;
    
    function renderNodeGroup(title, nodes, groupColor, badgeBg) {
        if (nodes.length === 0) return '';
        let h = `<div class="node-group">
            <div class="group-header">
                ${title} <span class="badge" style="background:${badgeBg};color:#fff">${nodes.length}</span>
            </div>`;
        nodes.forEach(n => {
            const prereqs = getPrereqs(n.id);
            const nextNodes = getNextNodes(n.id);
            const prereqText = prereqs.length > 0 ? `前置: ${prereqs.map(p=>p.name).join(', ')}` : '';
            const nextText = nextNodes.length > 0 ? `后续: ${nextNodes.map(p=>p.name).join(', ')}` : '';
            const meta = [n.difficulty, prereqText, nextText].filter(Boolean).join(' · ');
            
            h += `<div class="node-item" onclick="showDetail('${n.id}')">
                <div class="node-status ${getStatusClass(n.status)}"></div>
                <div class="node-info">
                    <div class="node-name">${n.name}</div>
                    <div class="node-meta">${meta}</div>
                </div>
                ${n.difficulty ? `<span class="node-difficulty">${n.difficulty}</span>` : ''}
            </div>`;
        });
        h += '</div>';
        return h;
    }
    
    html += renderNodeGroup('▶ 学习中', current, color, '#ff9800');
    html += renderNodeGroup('✅ 已完成', completed, color, '#4caf50');
    
    for (const [diff, nodes] of Object.entries(pendingByDiff)) {
        html += renderNodeGroup(`⏳ 待学习 · ${diff}`, nodes, color, '#555');
    }
    
    main.innerHTML = html;
}

// ===== L3 View =====
function renderL3() {
    const main = document.getElementById('main-content');
    let html = `<div class="main-header">
        <h1>🌐 全部领域 · 完整知识星图</h1>
        <div class="subtitle">${allNodes.length} 个知识节点 · ${Object.keys(domainStats).length} 个领域</div>
    </div>
    <input class="search-box" placeholder="搜索所有节点..." oninput="onSearch(this.value)" />`;
    
    for (const [domain, stats] of Object.entries(domainStats)) {
        const color = getDomainColor(domain);
        const icon = getDomainIcon(domain);
        const name = getDomainName(domain);
        const domainNodes = allNodes.filter(n => n.domain === domain);
        const completed = domainNodes.filter(n => n.status === 'completed').length;
        const current = domainNodes.filter(n => n.status === 'current').length;
        
        html += `<div class="l3-domain-section">
            <div class="l3-domain-header" style="border-color:${color};color:${color}">
                ${icon} ${name}
                <span style="font-size:12px;color:#888;font-weight:400;margin-left:auto">${completed}完成 · ${current}进行 · ${stats.total}总计</span>
            </div>`;
        
        domainNodes.forEach(n => {
            const meta = [n.difficulty, getStatusText(n.status)].filter(Boolean).join(' · ');
            html += `<div class="node-item" onclick="showDetail('${n.id}')">
                <div class="node-status ${getStatusClass(n.status)}"></div>
                <div class="node-info">
                    <div class="node-name">${n.name}</div>
                    <div class="node-meta">${meta}</div>
                </div>
                ${n.difficulty ? `<span class="node-difficulty">${n.difficulty}</span>` : ''}
            </div>`;
        });
        
        html += '</div>';
    }
    
    main.innerHTML = html;
}

// ===== Search =====
function onSearch(query) {
    searchQuery = query.toLowerCase().trim();
    if (!searchQuery) {
        if (currentLayer === 'L1') renderL1();
        else if (currentLayer === 'L2' && currentDomain) renderL2(currentDomain);
        else renderL3();
        return;
    }
    
    const results = allNodes.filter(n => 
        n.name.toLowerCase().includes(searchQuery) || 
        (n.domain && getDomainName(n.domain).includes(searchQuery)) ||
        (n.difficulty && n.difficulty.includes(searchQuery))
    );
    
    const main = document.getElementById('main-content');
    let html = `<div class="main-header">
        <h1>🔍 搜索: "${query}"</h1>
        <div class="subtitle">找到 ${results.length} 个节点</div>
    </div>`;
    
    results.forEach(n => {
        const color = getDomainColor(n.domain);
        const meta = [getDomainName(n.domain), n.difficulty, getStatusText(n.status)].filter(Boolean).join(' · ');
        html += `<div class="node-item" onclick="showDetail('${n.id}')">
            <div class="node-status ${getStatusClass(n.status)}"></div>
            <div class="node-info">
                <div class="node-name">${n.name}</div>
                <div class="node-meta">${meta}</div>
            </div>
            ${n.difficulty ? `<span class="node-difficulty">${n.difficulty}</span>` : ''}
        </div>`;
    });
    
    if (results.length === 0) {
        html += '<div class="empty-state"><div class="empty-icon">🔍</div><p>未找到匹配的节点</p></div>';
    }
    
    main.innerHTML = html;
}

// ===== Detail Panel =====
function showDetail(nodeId) {
    const node = allNodes.find(n => n.id === nodeId);
    if (!node) return;
    
    selectedNodeId = nodeId;
    const color = getDomainColor(node.domain);
    const icon = getDomainIcon(node.domain);
    const name = getDomainName(node.domain);
    
    // Get prerequisites and next nodes
    const prereqs = allEdges.filter(e => e.target === nodeId)
        .map(e => allNodes.find(n => n.id === e.source)).filter(Boolean);
    const nextNodes = allEdges.filter(e => e.source === nodeId)
        .map(e => allNodes.find(n => n.id === e.target)).filter(Boolean);
    
    let html = `
        <div class="detail-domain-tag" style="background:${color}22;color:${color};border:1px solid ${color}44">
            ${icon} ${name}
        </div>
        <div class="detail-title">${node.name}</div>
        <div class="detail-status">${getStatusText(node.status)} ${node.difficulty ? '· ' + node.difficulty : ''}</div>`;
    
    if (node.summary) {
        html += `<div class="detail-section">
            <h3>📝 简介</h3>
            <p>${node.summary}</p>
        </div>`;
    }
    
    if (prereqs.length > 0) {
        html += `<div class="detail-section">
            <h3>⬆️ 前置知识</h3>
            <ul class="detail-prereqs">
                ${prereqs.map(p => `<li onclick="showDetail('${p.id}')" style="border-left:2px solid ${getDomainColor(p.domain)}">
                    <div class="node-status ${getStatusClass(p.status)}" style="display:inline-block;width:8px;height:8px;margin-right:6px"></div>
                    ${p.name}
                </li>`).join('')}
            </ul>
        </div>`;
    }
    
    if (nextNodes.length > 0) {
        html += `<div class="detail-section">
            <h3>⬇️ 后续知识</h3>
            <ul class="detail-prereqs">
                ${nextNodes.map(p => `<li onclick="showDetail('${p.id}')" style="border-left:2px solid ${getDomainColor(p.domain)}">
                    <div class="node-status ${getStatusClass(p.status)}" style="display:inline-block;width:8px;height:8px;margin-right:6px"></div>
                    ${p.name}
                </li>`).join('')}
            </ul>
        </div>`;
    }
    
    if (node.master_score > 0) {
        html += `<div class="detail-section">
            <h3>📊 掌握度</h3>
            <div style="background:rgba(255,255,255,0.08);border-radius:6px;height:8px;margin-top:4px">
                <div style="background:${color};height:100%;border-radius:6px;width:${Math.round(node.master_score*100)}%"></div>
            </div>
            <p style="font-size:11px;color:#666;margin-top:4px">${Math.round(node.master_score*100)}%</p>
        </div>`;
    }
    
    document.getElementById('detail-content').innerHTML = html;
    document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
    document.getElementById('detail-panel').classList.remove('open');
    selectedNodeId = null;
}

// ===== Layer Switching =====
function switchLayer(layer) {
    currentLayer = layer;
    document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', ['L1','L2','L3'][i] === layer);
    });
    
    closeDetail();
    searchQuery = '';
    
    if (layer === 'L1') {
        currentDomain = null;
        renderL1();
    } else if (layer === 'L2') {
        if (!currentDomain) {
            // Default to first domain with activity
            const activeDomain = Object.entries(domainStats).find(([d,s]) => {
                return allNodes.some(n => n.domain === d && n.status !== 'pending');
            });
            currentDomain = activeDomain ? activeDomain[0] : Object.keys(domainStats)[0];
        }
        renderL2(currentDomain);
    } else {
        currentDomain = null;
        renderL3();
    }
    
    renderSidebarDomains();
}

function selectDomain(domainId) {
    currentDomain = domainId;
    switchLayer('L2');
}

// ===== Init =====
renderStats();
renderSidebarDomains();
renderL1();
</script>
</body>
</html>
