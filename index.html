<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TREE测试页</title>
    <style>
        body { background: #1a1a2e; color: #e0e0e0; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #chart { width: 800px; height: 600px; background: rgba(255,255,255,0.05); border-radius: 12px; }
        .info { position: fixed; top: 20px; left: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="info">GitHub Pages渲染测试 · <span id="status">加载中...</span></div>
    <div id="chart"></div>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script>
        document.getElementById('status').textContent = 'ECharts加载: ' + (typeof echarts !== 'undefined' ? '✅成功' : '❌失败');
        if (typeof echarts !== 'undefined') {
            var chart = echarts.init(document.getElementById('chart'), 'dark');
            chart.setOption({
                title: { text: 'TREE知识星图 · 渲染测试', left: 'center', top: 20, textStyle: { color: '#fff', fontSize: 18 } },
                series: [{
                    type: 'graph',
                    layout: 'force',
                    roam: true,
                    data: [
                        { name: '天文', symbolSize: 60, itemStyle: { color: '#5470c6' }, label: { fontSize: 14 } },
                        { name: '历史', symbolSize: 50, itemStyle: { color: '#fac858' }, label: { fontSize: 14 } },
                        { name: '哲学', symbolSize: 45, itemStyle: { color: '#9a60b4' }, label: { fontSize: 14 } },
                        { name: '地球是圆的', symbolSize: 25, itemStyle: { color: '#91cc75' } },
                        { name: '走出非洲', symbolSize: 25, itemStyle: { color: '#ee6666' } },
                        { name: '笛卡尔恶魔', symbolSize: 25, itemStyle: { color: '#73c0de' } }
                    ],
                    links: [
                        { source: '天文', target: '地球是圆的' },
                        { source: '历史', target: '走出非洲' },
                        { source: '哲学', target: '笛卡尔恶魔' }
                    ],
                    force: { repulsion: 200, edgeLength: 100 },
                    label: { show: true },
                    emphasis: { focus: 'adjacency' }
                }]
            });
            document.getElementById('status').textContent += ' · 图表渲染: ✅成功';
        } else {
            document.getElementById('status').textContent += ' · 图表渲染: ❌失败';
        }
    </script>
</body>
</html>
